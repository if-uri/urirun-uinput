name: release

# Auto-publish this package to PyPI when its pyproject version is bumped on main
# (or on an explicit v* tag). Mirrors if-uri/urirun's release.yml but for a single
# package whose pyproject.toml sits at the repo root. Idempotent: only the first
# push at a new version publishes; later pushes are a no-op via the PyPI gate.
#
# PREREQUISITE (one-time, on pypi.org): configure PyPI Trusted Publishing for this
# package -> publisher = this repo, workflow `release.yml`. For a brand-new project
# use PyPI's "pending publisher". Until that is set, the publish step fails loudly
# (by design — a non-publish must be visible, not silent).

on:
  push:
    tags: ["v*"]
    branches: ["main"]

permissions:
  id-token: write   # PyPI Trusted Publishing (OIDC) — no token needed once configured

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package name + version from pyproject
        id: meta
        run: |
          NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved $NAME $VER"

      - name: Decide whether to publish (idempotent PyPI gate)
        id: gate
        run: |
          N="${{ steps.meta.outputs.name }}"; V="${{ steps.meta.outputs.version }}"
          if curl -fsS "https://pypi.org/pypi/$N/$V/json" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "$N $V already on PyPI — nothing to publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "$N $V not on PyPI — will build and publish."
          fi

      - name: Build wheel + sdist
        if: steps.gate.outputs.publish == 'true'
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        if: steps.gate.outputs.publish == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
